name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt diff:"
            echo "$out"
            exit 1
          fi
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race -count=1 ./...

  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          go build -trimpath -ldflags='-s -w' -o "dist/xray-aio-${GOOS}-${GOARCH}" ./cmd/xray-aio
      - uses: actions/upload-artifact@v4
        with:
          name: xray-aio-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/xray-aio-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62
          args: --timeout=5m

  integration:
    name: integration (debian-12 systemd)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      # Boots a privileged debian:12 container with systemd as PID 1
      # and runs the full home-stealth install + probe checklist
      # (config write, sysuser, systemd start, /sub/<token>/, proxy
      # gate, idempotent re-install). Catches regressions like #10
      # (missing system users), #11 (Caddy directive reordering)
      # and #12 (host-matcher dropping HTTP/1.1 CONNECT) without
      # needing a real domain or VPS.
      - name: integration
        run: make integration
